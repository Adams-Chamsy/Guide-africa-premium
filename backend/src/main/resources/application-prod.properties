# PostgreSQL (Production) — configure via environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/guideafrica?prepareThreshold=0}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:guideafrica}
spring.datasource.password=${DATABASE_PASSWORD:}

# Hikari Connection Pool (Supabase free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabled
spring.h2.console.enabled=false

# Mail SMTP (configure via env vars)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@guideafrica.com}

# Actuator - health check only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Upload path (production - defaults to ./uploads for local dev)
app.upload.dir=${UPLOAD_DIR:./uploads}

# CORS — allowed frontend origins (Vercel + custom domain)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://guide-africa-premium.vercel.app}

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Swagger — enabled in prod for API documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

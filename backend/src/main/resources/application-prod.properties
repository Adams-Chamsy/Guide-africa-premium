# PostgreSQL Supabase (Production)
spring.datasource.url=jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres.frvecbdqziqrykwjhopx
spring.datasource.password=Pe2xPYI4HeBcjqON

# Hikari Connection Pool (Supabase free tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console disabled
spring.h2.console.enabled=false

# Mail SMTP (configure via env vars)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@guideafrica.com}

# Actuator - health check only
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Upload path (production - defaults to ./uploads for local dev)
app.upload.dir=${UPLOAD_DIR:./uploads}

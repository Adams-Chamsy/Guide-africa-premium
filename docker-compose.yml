version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: guideafrica
      POSTGRES_USER: guideafrica
      POSTGRES_PASSWORD: ${DB_PASSWORD:-guideafrica_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guideafrica"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: guideafrica
      DB_USERNAME: guideafrica
      DB_PASSWORD: ${DB_PASSWORD:-guideafrica_secret}
      JWT_SECRET: ${JWT_SECRET:-GuideAfricaPremium2024SecretKeyForJWTTokenGeneration256bitMinimum}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      UPLOAD_DIR: /app/uploads
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@guideafrica.com}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
